name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt needs to run on:" && echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test + coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: coverage summary
        run: |
          go tool cover -func=coverage.out | tail -n 20 >> "$GITHUB_STEP_SUMMARY"
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          echo "**Total:** $total" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: apigen drift check
        run: |
          go run ./apigen
          if ! git diff --exit-code; then
            echo "::error::apigen output differs from committed files. Run 'go run ./apigen' and commit the result."
            exit 1
          fi

      - name: go build
        run: go build ./...

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --redact --verbose --no-banner --exit-code 1
