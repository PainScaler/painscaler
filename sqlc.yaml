version: "2"
sql:
  - engine: "sqlite"
    queries: "db/query.sql"
    schema: "db/schema.sql"
    gen:
      go:
        package: "storage"
        out: "internal/storage"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - column: "simulation_runs.created_at"
            go_struct_tag: 'ts_type:"Date" ts_transform:"new Date(__VALUE__)"'
